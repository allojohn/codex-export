<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Codex Conversation Export{% endblock %}</title>
  <style>{{ css|safe }}</style>
</head>
<body>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
  <div class="floating-process-controls" hidden aria-hidden="true">
    <button class="floating-process-btn floating-process-btn-right" type="button">Hide details</button>
  </div>
  <script>{{ js|safe }}</script>
</body>
</html>
